repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check --fix
        entry: python -m ruff check --fix
        language: system
        types_or: [python, pyi]
        stages: [pre-commit]

      - id: ruff-format
        name: ruff format
        entry: python -m ruff format
        language: system
        types_or: [python, pyi]
        stages: [pre-commit]

      - id: pytest
        name: pytest (pre-push)
        entry: python -m pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
